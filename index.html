<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Father Daughter Dance 2026</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1320;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
    text-align:center;
}

h1{
    font-size:2rem;
    margin-bottom:8px;
}

.subtitle{
    color:#c9d6e8;
    margin-bottom:20px;
}

.camera-container{
    position:relative;
    width:100%;
    overflow:hidden;
    border-radius:20px;
    background:black;
}

video{
    width:100%;
    display:block;
}

#frameOverlay{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

.controls{
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

button{
    border:none;
    padding:14px 20px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

.primary{
    background:#5c8ecb;
    color:white;
}

.secondary{
    background:#e5e7eb;
    color:black;
}

.success{
    background:#4caf50;
    color:white;
}

.preview-section{
    margin-top:25px;
    display:none;
}

.preview-section img{
    width:100%;
    border-radius:20px;
}

.note{
    margin-top:20px;
    font-size:14px;
    color:#c9d6e8;
}

</style>
</head>

<body>

<div class="container">

<h1>Father Daughter Dance 2026</h1>

<div class="subtitle">
Coastal Carolina Edition
</div>

<div class="camera-container">

<video
    id="video"
    autoplay
    playsinline
></video>

<img
    id="frameOverlay"
    src="frame.png"
    alt="Frame Overlay">

</div>

<div class="controls">

<button
    class="primary"
    onclick="takePhoto()">
    Take Photo
</button>

<button
    class="secondary"
    onclick="switchCamera()">
    Switch Camera
</button>

<button
    class="success"
    onclick="downloadPhoto()">
    Save Photo
</button>

</div>

<div
    class="preview-section"
    id="previewSection">

    <h2 style="margin-bottom:10px;">
        Preview
    </h2>

    <img id="previewImage">

</div>

<div class="note">
Scan • Smile • Save
</div>

<canvas
    id="canvas"
    style="display:none;">
</canvas>

</div>

<script>

let stream;
let facingMode = "user";
let photoData = "";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const previewImage = document.getElementById("previewImage");
const previewSection = document.getElementById("previewSection");

async function startCamera(){

    try{

        if(stream){
            stream.getTracks().forEach(track=>track.stop());
        }

        stream =
            await navigator.mediaDevices.getUserMedia({
                video:{
                    facingMode:facingMode
                },
                audio:false
            });

        video.srcObject = stream;

    }catch(error){

        alert(
            "Unable to access camera. Please allow camera permissions."
        );

        console.error(error);
    }
}

function switchCamera(){

    facingMode =
        facingMode === "user"
        ? "environment"
        : "user";

    startCamera();
}

function takePhoto(){

    const context =
        canvas.getContext("2d");

    canvas.width =
        video.videoWidth;

    canvas.height =
        video.videoHeight;

    context.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    const frame =
        document.getElementById(
            "frameOverlay"
        );

    context.drawImage(
        frame,
        0,
        0,
        canvas.width,
        canvas.height
    );

    photoData =
        canvas.toDataURL(
            "image/png"
        );

    previewImage.src =
        photoData;

    previewSection.style.display =
        "block";

    previewSection.scrollIntoView({
        behavior:"smooth"
    });
}

function downloadPhoto(){

    if(!photoData){

        alert(
            "Please take a photo first."
        );

        return;
    }

    const link =
        document.createElement("a");

    link.href =
        photoData;

    link.download =
        "mdickey78.github.io/Father_Daughter_Dance_2026.png";

    link.click();
}

startCamera();

</script>

</body>
</html>
